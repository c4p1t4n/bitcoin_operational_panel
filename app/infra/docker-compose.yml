services:
  postgres:
    image: postgres:16-alpine
    container_name: bitcoin-ops-postgres
    environment:
      POSTGRES_DB: bitcoin_ops
      POSTGRES_USER: ops_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ops_password_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_user -d bitcoin_ops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bitcoin-ops-network

volumes:
  postgres_data:
    driver: local

networks:
  bitcoin-ops-network:
    driver: bridge
