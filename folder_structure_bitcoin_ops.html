const tagColors = {
  btc: 'tag-btc', be: 'tag-be', ws: 'tag-ws', fe: 'tag-fe', sh: 'tag-sh'
}
const tagLabels = {
  btc: 'Bitcoin', be: 'Backend', ws: 'WebSocket', fe: 'Frontend', sh: 'Shared'
}

const fileIcon = '<i class="ti ti-file-code" style="font-size:13px;color:var(--text-muted)" aria-hidden="true"></i>'
const folderOpenIcon = '<i class="ti ti-folder-open" style="font-size:13px;color:var(--text-accent)" aria-hidden="true"></i>'
const folderClosedIcon = '<i class="ti ti-folder" style="font-size:13px;color:var(--text-muted)" aria-hidden="true"></i>'

function buildTree() {
  const tree = document.getElementById('tree')
  tree.innerHTML = ''

  const openState = {}
  data.forEach(n => { if (n.type === 'folder') openState[n.id] = n.open !== false })

  function hasChildren(idx) {
    if (idx >= data.length - 1) return false
    return data[idx + 1].depth > data[idx].depth
  }

  function getChildren(parentIdx) {
    const parentDepth = data[parentIdx].depth
    const children = []
    for (let i = parentIdx + 1; i < data.length; i++) {
      if (data[i].depth <= parentDepth) break
      if (data[i].depth === parentDepth + 1) children.push(i)
    }
    return children
  }

  function renderNode(idx, container) {
    const node = data[idx]
    const isFolder = node.type === 'folder'
    const children = isFolder ? getChildren(idx) : []
    const hasKids = children.length > 0

    const row = document.createElement('div')
    row.className = 'row' + (hasKids ? ' clickable' : '')
    row.style.paddingLeft = (node.depth * 20) + 'px'

    const branch = document.createElement('span')
    branch.className = 'branch' + (hasKids ? ' toggle' : '')
    branch.textContent = hasKids ? (openState[node.id] ? '▾' : '▸') : ''

    const icon = document.createElement('span')
    icon.className = 'icon'
    if (isFolder) {
      icon.innerHTML = openState[node.id] ? folderOpenIcon : folderClosedIcon
    } else {
      icon.innerHTML = fileIcon
    }

    const name = document.createElement('span')
    name.className = 'name' + (isFolder ? (node.depth === 0 ? ' root-folder' : ' folder') : '')
    name.textContent = node.label

    row.appendChild(branch)
    row.appendChild(icon)
    row.appendChild(name)

    if (node.tag) {
      const tag = document.createElement('span')
      tag.className = 'tag ' + tagColors[node.tag]
      tag.textContent = tagLabels[node.tag]
      row.appendChild(tag)
    }

    if (node.comment) {
      const comment = document.createElement('span')
      comment.className = 'comment'
      comment.textContent = '— ' + node.comment
      row.appendChild(comment)
    }

    container.appendChild(row)

    if (hasKids) {
      const childContainer = document.createElement('div')
      childContainer.className = 'children' + (openState[node.id] ? '' : ' collapsed')
      childContainer.style.maxHeight = openState[node.id] ? '9999px' : '0'

      children.forEach(ci => renderNode(ci, childContainer))
      container.appendChild(childContainer)

      row.addEventListener('click', () => {
        openState[node.id] = !openState[node.id]
        branch.textContent = openState[node.id] ? '▾' : '▸'
        icon.innerHTML = openState[node.id] ? folderOpenIcon : folderClosedIcon
        if (openState[node.id]) {
          childContainer.style.maxHeight = '9999px'
          childContainer.classList.remove('collapsed')
        } else {
          childContainer.style.maxHeight = '0'
          childContainer.classList.add('collapsed')
        }
      })
    }
  }

  data.forEach((node, idx) => {
    if (node.depth === 0) renderNode(idx, tree)
  })
}

buildTree()
